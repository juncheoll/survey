method: subspec_sd
vram_limit_gb: 16
seed: 0
device: cuda:0
max_length: 2048
max_new_tokens: 128
test_prompt: |
  [INST] <<SYS>>
  You are a helpful, respectful and honest assistant. Always answer as helpfully as possible, while being safe. Your answers should not include any harmful, unethical, racist, sexist, toxic, dangerous, or illegal content. Please ensure that your responses are socially unbiased and positive in nature.
  If a question does not make any sense, or is not factually coherent, explain why instead of answering something not correct. If you don't know the answer to a question, please don't share false information.
  <</SYS>


  What is a Dyson Sphere? [\INST]

llm_path: meta-llama/Llama-2-13b-hf
# Optional: pin Hugging Face to an existing cache and fail fast instead of
# downloading missing files. Override/remove these if your cache lives elsewhere.
model_cache_dir: ~/.cache/huggingface/hub
local_files_only: true

do_sample: false
temperature: 0

generator_kwargs:
  prefill_chunk_size: 256
  verify_method: exact
  verify_kwargs: {}

draft_params:
  temperature: 0.2
  max_depth: 48
  topk_len: 6

recipe:
  class_path: specdecodes.helpers.recipes.subspec.hqq_4bit_postspec:Recipe

cache_implementation: static
warmup_iter: 1
compile_mode: max-autotune
